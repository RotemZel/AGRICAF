<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #f5f2e8;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 210px; flex-shrink: 0; background: #1a1a1a; color: #ddd;
    display: flex; flex-direction: column; padding: 18px 14px; overflow-y: auto;
  }
  #sidebar h1 {
    font-size: 14px; font-weight: 700; color: #fff;
    letter-spacing: 0.05em; margin-bottom: 2px;
  }
  #sidebar .tagline { font-size: 10px; color: #777; margin-bottom: 18px; line-height: 1.4; }
  .section-lbl {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
    color: #555; margin: 14px 0 6px;
  }
  .crop-btn {
    display: block; width: 100%; margin-bottom: 4px; padding: 6px 10px;
    border: 1px solid #333; border-radius: 5px; background: #272727;
    color: #bbb; font-size: 12px; cursor: pointer; text-align: left;
    transition: background 0.15s;
  }
  .crop-btn:hover  { background: #333; }
  .crop-btn.active { background: #5f3d00; border-color: #8B5A00; color: #fff; }
  .pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill {
    padding: 3px 8px; border-radius: 20px; border: 1px solid #333;
    background: #272727; color: #bbb; font-size: 11px; cursor: pointer;
    transition: background 0.15s;
  }
  .pill:hover { background: #333; }
  .pill.off   { opacity: 0.22; }
  .month-row {
    display: flex; align-items: center; gap: 8px; padding: 3px 2px;
    cursor: pointer; user-select: none; border-radius: 4px; transition: opacity 0.15s;
  }
  .month-row.off { opacity: 0.28; }
  .month-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .month-name { font-size: 11px; color: #ccc; }
  #main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; overflow: hidden; padding: 18px 10px 10px;
  }
  #chart-header { text-align: center; margin-bottom: 8px; }
  #chart-title  { font-size: 15px; font-weight: 600; color: #333; }
  #chart-sub    { font-size: 11px; color: #999; margin-top: 2px; }
  #svg-wrap {
    flex: 1; width: 100%; display: flex;
    align-items: center; justify-content: center; overflow: hidden;
  }
  #svg-wrap svg { display: block; }
  #tip {
    position: fixed; background: rgba(15,15,15,0.90); color: #eee;
    font-size: 11px; line-height: 1.55; padding: 8px 11px; border-radius: 6px;
    pointer-events: none; display: none; max-width: 260px; z-index: 999;
  }
  #tip b { color: #ace600; }
  #no-data { color: #999; font-size: 13px; margin-top: 60px; display: none; }
</style>
</head>

const getLags = c =>

  cd.innerHTML = "";

        activeLags.add(l);
      }
      b.classList.toggle("off", !activeLags.has(l));
      draw();
    };
    ld.appendChild(b);
  });
 
  // -- Month swatches (built once; classes synced on subsequent calls)
  const md = document.getElementById("month-swatches");
  if (md.children.length===0) {
    for (let m=1; m<=12; m++) {
      const row = document.createElement("div");
      row.className = "month-row"+(activeMonths.has(m)?"":" off");
      row.dataset.m = m;
      row.innerHTML =
        `<div class="month-dot" style="background:${MONTH_COLORS[m-1]}"></div>`+
        `<span class="month-name">${MONTH_NAMES[m-1]}</span>`;
      row.onclick = () => {
        if (activeMonths.has(m)) activeMonths.delete(m); else activeMonths.add(m);
        row.classList.toggle("off", !activeMonths.has(m));
        draw();
      };
      md.appendChild(row);
    }
  } else {
    [...md.children].forEach(r => {
      r.classList.toggle("off", !activeMonths.has(+r.dataset.m));
    });
  }
}
function draw() {
  const svgEl = document.getElementById("heb-svg");
  const noData = document.getElementById("no-data");
  const wrap   = document.getElementById("svg-wrap");
  d3.select(svgEl).selectAll("*").remove();
 
  // -- Collect edges + nodes from all selected lags
  let allEdges = [], nodeSet = new Map();
  activeLags.forEach(l => {
    const fd = DATA[activeCrop]?.[String(l)];
    if (!fd) return;
    fd.edges.forEach(e => allEdges.push(e));
    fd.nodes.forEach(n => { if (!nodeSet.has(n.id)) nodeSet.set(n.id, n.group); });
  });
 
  // Filter by active months
  const edges = allEdges.filter(e => activeMonths.has(e.month));
 
  // Keep only nodes that appear in at least one active edge
  const connectedIds = new Set();
  edges.forEach(e => { connectedIds.add(e.from); connectedIds.add(e.to); });
  nodeSet.forEach((_, id) => { if (!connectedIds.has(id)) nodeSet.delete(id); });
 
  // Subtitle: list selected lags concisely
  const lagList = [...activeLags].sort((a,b)=>a-b).map(l=>"L"+l).join(", ");
  document.getElementById("chart-title").textContent = cap(activeCrop);
  document.getElementById("chart-sub").textContent =
    "Lags: "+lagList+" \u2002|\u2002value = local_interaction (raw)";
 
  if (nodeSet.size===0||edges.length===0) {
    svgEl.style.display="none"; noData.style.display="block";
    noData.textContent= edges.length===0
      ? "No edges for the current selection."
      : "No data for this selection.";
    return;
  }
  svgEl.style.display="block"; noData.style.display="none";
 
  const W = wrap.clientWidth||700, H = wrap.clientHeight||700;
  const R = Math.min(W,H)/2 - 110;
  d3.select(svgEl).attr("width",W).attr("height",H);
  const g = d3.select(svgEl).append("g").attr("transform",`translate(${W/2},${H/2})`);
 
  const gmap = {};
  nodeSet.forEach((grp, id) => {
    (gmap[grp]=gmap[grp]||[]).push({name:id, group:grp});
  });
  const rootData = {
    name:"origin",
    children: Object.entries(gmap).map(([grp,lv])=>({name:grp,children:lv}))
  };
  const root = d3.hierarchy(rootData);
  d3.cluster().size([2*Math.PI, R])(root);
  const nmap = {};
  root.leaves().forEach(d => { nmap[d.data.name]=d; });
 
  const vals = edges.map(e=>e.value);
  const vMin = d3.min(vals), vMax = d3.max(vals);
  const wSc  = d3.scaleLinear().domain([vMin,vMax]).range([0.25,3.0]).clamp(true);
  const aSc  = d3.scaleLinear().domain([vMin,vMax]).range([0.07,0.70]).clamp(true);
 
  const line = d3.lineRadial()
    .curve(d3.curveBundle.beta(0.85)).radius(d=>d.y).angle(d=>d.x);
 
  const edgesG = g.append("g").attr("fill","none");
  [...edges].sort((a,b)=>a.value-b.value).forEach(e => {
    const src=nmap[e.from], tgt=nmap[e.to];
    if (!src||!tgt) return;
    edgesG.append("path").datum(e)
      .attr("d", line(src.path(tgt)))
      .attr("stroke", MONTH_COLORS[e.month-1])
      .attr("stroke-width",   wSc(e.value))
      .attr("stroke-opacity", aSc(e.value))
      .attr("class","ep");
  });
  const nodesG = g.append("g");
  const tip = document.getElementById("tip");
 
  root.leaves().forEach(d => {
    const col = GROUP_COLORS[d.data.group]||"#888";
    const deg = d.x*180/Math.PI - 90;
    const flip = d.x > Math.PI;
    const xf = `rotate(${deg}) translate(${d.y},0)`;
    nodesG.append("circle")
      .attr("transform",xf).attr("r",3).attr("fill",col).attr("opacity",0.88);
    nodesG.append("text")
      .attr("transform", xf+(flip?" rotate(180)":""))
      .attr("dx", flip?-8:8).attr("dy","0.35em")
      .attr("text-anchor", flip?"end":"start")
      .attr("font-size","11px").attr("fill",col).attr("opacity",0.85)
      .style("cursor","default").text(d.data.name)
      .on("mouseover", function(event) {
        const nm = d.data.name;
        edgesG.selectAll(".ep")
          .attr("stroke-opacity", function(e) {
            return (e.from===nm||e.to===nm) ? Math.min(aSc(e.value)*2,0.95) : 0.03;
          })
          .attr("stroke-width", function(e) {
            return (e.from===nm||e.to===nm) ? wSc(e.value)*1.7 : 0.2;
          });
        const links = edges.filter(e=>e.from===nm||e.to===nm);
        if (!links.length) return;
        const byM = {};
        links.forEach(e => {
          const p = e.from===nm?e.to:e.from;
          (byM[e.month]=byM[e.month]||[]).push(
            p+` <span style="color:#ace600">`+e.value.toFixed(4)+`</span>`);
        });
        const rows = Object.keys(byM).sort((a,b)=>+a-+b)
          .map(m=>`<b>${MONTH_NAMES[m-1]}</b>: ${byM[m].join(", ")}`).join("<br>");
        tip.innerHTML = `<b>${nm}</b><br>${rows}`;
        tip.style.display="block";
        tip.style.left=(event.clientX+14)+"px";
        tip.style.top =(event.clientY-10)+"px";
      })
      .on("mousemove", function(event) {
        tip.style.left=(event.clientX+14)+"px";
        tip.style.top =(event.clientY-10)+"px";
      })
      .on("mouseout", function() {
        edgesG.selectAll(".ep")
          .attr("stroke-opacity", e=>aSc(e.value))
          .attr("stroke-width",   e=>wSc(e.value));
        tip.style.display="none";
      });
  });
 
  const arcG = g.append("g").attr("opacity",0.40);
  root.children.forEach(grp => {
    const lv = grp.leaves(); if (!lv.length) return;
    const angles = lv.map(l=>l.x);
    const mid = (d3.min(angles)+d3.max(angles))/2;
    const flip = mid > Math.PI;
    arcG.append("text")
      .attr("transform",
        `rotate(${mid*180/Math.PI-90}) translate(${R+68},0)`+(flip?" rotate(180)":""))
      .attr("text-anchor","middle").attr("font-size","9px").attr("font-weight","600")
      .attr("fill", GROUP_COLORS[grp.data.name]||"#555")
      .text(grp.data.name);
  });
}
 
buildControls();
draw();
window.addEventListener("resize", draw);
</script>
